<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>材料涨价监测站 — 第一时间发现投资机会</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f172a; --card: #1e293b; --card-hover: #273549;
    --border: #334155; --text: #f1f5f9; --text-dim: #94a3b8;
    --red: #ef4444; --red-bg: rgba(239,68,68,0.12);
    --green: #22c55e; --green-bg: rgba(34,197,94,0.12);
    --orange: #f59e0b; --accent: #3b82f6; --accent-dim: rgba(59,130,246,0.15);
    --purple: #a855f7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system,"Microsoft YaHei",sans-serif;
    background: var(--bg); color: var(--text);
    padding: 0; min-height: 100vh;
  }
  .container { max-width: 1280px; margin: 0 auto; padding: 16px 16px 60px; }

  /* HEADER */
  .header {
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 10px;
    padding: 12px 0 16px; border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .header h1 {
    font-size: 1.4em; font-weight: 700;
    background: linear-gradient(90deg,#3b82f6,#a855f7);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-right {
    font-size: 0.8em; color: var(--text-dim);
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .dot { display:inline-block; width:8px; height:8px; background:var(--green); border-radius:50%; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .badge-auto { background:var(--green-bg); color:var(--green); padding:2px 8px; border-radius:10px; font-size:0.72em; white-space:nowrap; }
  .badge-manual { background:var(--accent-dim); color:var(--accent); padding:2px 8px; border-radius:10px; font-size:0.72em; white-space:nowrap; }
  #refreshBtn {
    background:var(--accent); color:#fff; border:none; border-radius:6px;
    padding:4px 12px; cursor:pointer; font-size:0.8em; white-space:nowrap;
  }
  #refreshBtn:hover { opacity:0.85; }

  /* STATS ROW */
  .stats-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
    gap: 8px; margin-bottom: 14px;
  }
  .stat-card {
    background:var(--card); border-radius:8px; padding:10px 8px; text-align:center;
    border:1px solid var(--border);
  }
  .stat-count { font-size:1.2em; font-weight:700; }
  .stat-label { font-size:0.68em; color:var(--text-dim); margin-top:2px; }
  .stat-up .stat-count { color:var(--red); }
  .stat-down .stat-count { color:var(--green); }

  /* FILTER */
  .filter-bar {
    display: flex; flex-wrap: wrap; gap: 5px;
    margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px;
  }
  .filter-btn {
    padding:4px 12px; border-radius:16px;
    background:transparent; color:var(--text-dim);
    border:1px solid var(--border); cursor:pointer;
    font-size:0.78em; transition:all 0.15s; white-space:nowrap;
  }
  .filter-btn:hover { background:var(--card-hover); }
  .filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  /* SECTION TABS */
  .section-tabs {
    display: flex; gap: 2px; margin-bottom: 14px;
    background: var(--card); border-radius: 10px; padding: 3px;
    border: 1px solid var(--border);
    overflow-x: auto;
  }
  .section-tab {
    padding: 7px 18px; border-radius: 8px;
    background: transparent; color: var(--text-dim);
    border: none; cursor: pointer; font-size: 0.85em;
    transition: all 0.15s; white-space: nowrap;
  }
  .section-tab:hover { color: var(--text); }
  .section-tab.active { background: var(--accent-dim); color: var(--accent); font-weight: 600; }

  /* ===== PRICE CARDS ===== */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 10px;
  }
  .card {
    background:var(--card); border-radius:10px; padding:14px 16px;
    border:1px solid var(--border); cursor:default;
    transition:all 0.15s;
  }
  .card:hover { background:var(--card-hover); border-color:var(--accent); transform:translateY(-1px); }
  .card-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
  .card-cat { font-size:0.65em; color:var(--text-dim); padding:1px 8px; border-radius:6px; background:var(--accent-dim); }
  .card-name { font-size:1em; font-weight:700; }
  .card-price-row { display:flex; align-items:baseline; gap:6px; margin:4px 0; }
  .card-price { font-size:1.4em; font-weight:700; }
  .card-unit { font-size:0.75em; color:var(--text-dim); }
  .card-changes { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:4px; }
  .change-badge { padding:1px 7px; border-radius:5px; font-size:0.7em; font-weight:600; }
  .change-badge.up { background:var(--red-bg); color:var(--red); }
  .change-badge.down { background:var(--green-bg); color:var(--green); }
  .change-badge.flat { background:rgba(148,163,184,0.15); color:var(--text-dim); }
  .card-stock { font-size:0.72em; color:var(--accent); }
  .card-footer { display:flex; justify-content:space-between; align-items:center; margin-top:6px; border-top:1px solid var(--border); padding-top:6px; }
  .card-source { font-size:0.65em; color:var(--text-dim); }
  .card-arrow { font-size:0.85em; }

  /* CHART */
  .chart-section { margin-top:24px; }
  .chart-tabs { display:flex; gap:4px; margin-bottom:10px; flex-wrap:wrap; }
  .chart-tab {
    padding:5px 12px; border-radius:6px;
    background:transparent; color:var(--text-dim);
    border:1px solid var(--border); cursor:pointer;
    font-size:0.78em; transition:all 0.1s;
  }
  .chart-tab:hover { background:var(--card-hover); }
  .chart-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .chart-box { background:var(--card); border-radius:10px; padding:14px; border:1px solid var(--border); height:340px; position:relative; }
  .chart-box canvas { width:100%!important; height:300px!important; }
  .chart-empty { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:0.85em; }

  /* ===== NEWS ===== */
  .news-list { list-style:none; }
  .news-item {
    padding:12px 14px; border-bottom:1px solid var(--border);
    transition:all 0.1s;
  }
  .news-item:last-child { border-bottom:none; }
  .news-item:hover { background:var(--card-hover); }
  .news-date { font-size:0.7em; color:var(--text-dim); margin-right:8px; white-space:nowrap; }
  .news-source { font-size:0.7em; color:var(--accent); margin-right:8px; white-space:nowrap; }
  .news-title { font-size:0.85em; flex:1; }
  .news-tags { display:flex; gap:4px; flex-wrap:wrap; }
  .news-tag {
    font-size:0.65em; padding:1px 7px; border-radius:4px;
    background:var(--accent-dim); color:var(--accent);
  }
  .news-title a { color:var(--text); text-decoration:none; }
  .news-title a:hover { color:var(--accent); }

  /* RANK TABLE */
  .rank-section { margin-top:24px; }
  .rank-table { width:100%; border-collapse:collapse; font-size:0.82em; }
  .rank-table thead th {
    background:var(--card); color:var(--text-dim); padding:8px 10px;
    text-align:left; font-weight:600; font-size:0.75em;
    border-bottom:2px solid var(--border);
  }
  .rank-table tbody td { padding:8px 10px; border-bottom:1px solid var(--border); }
  .rank-table tbody tr:hover { background:var(--card-hover); }
  .rank-num { font-weight:700; color:var(--text-dim); width:28px; }

  /* FOOTER */
  .footer { margin-top:36px; padding:16px 0; text-align:center; border-top:1px solid var(--border); font-size:0.72em; color:var(--text-dim); }

  /* RESPONSIVE */
  @media (max-width:640px) {
    .card-grid { grid-template-columns:1fr; }
    .header h1 { font-size:1.15em; }
    .news-item { flex-wrap:wrap; }
  }

  .section-content { display:none; }
  .section-content.active { display:block; }
</style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>📊 材料涨价监测站</h1>
    <div class="header-right">
      <span class="dot"></span>
      <span id="updateTime">加载中...</span>
      <span class="badge-auto">期货自动</span>
      <span class="badge-manual">特气手动</span>
      <button id="refreshBtn">⟳ 刷新</button>
    </div>
  </div>

  <!-- SECTION TABS -->
  <div class="section-tabs" id="sectionTabs">
    <button class="section-tab active" data-section="prices">📈 价格监控</button>
    <button class="section-tab" data-section="news">📰 资讯摘要</button>
    <button class="section-tab" data-section="ranking">🏆 涨幅排行</button>
  </div>

  <!-- ====== SECTION: PRICES ====== -->
  <div class="section-content active" id="sectionPrices">

    <!-- STATS -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card stat-up"><div class="stat-count" id="upCount">0</div><div class="stat-label">月涨</div></div>
      <div class="stat-card stat-down"><div class="stat-count" id="downCount">0</div><div class="stat-label">月跌</div></div>
      <div class="stat-card"><div class="stat-count" id="hotCount">0</div><div class="stat-label">月涨>20%</div></div>
      <div class="stat-card"><div class="stat-count" id="autoCount">0</div><div class="stat-label">自动</div></div>
      <div class="stat-card"><div class="stat-count" id="manualCount">0</div><div class="stat-label">手动</div></div>
      <div class="stat-card"><div class="stat-count" id="totalCount">0</div><div class="stat-label">总品种</div></div>
    </div>

    <!-- FILTER -->
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-filter="all">全部</button>
    </div>

    <!-- CARDS -->
    <div class="card-grid" id="cardGrid"></div>

    <!-- CHART -->
    <div class="chart-section">
      <div class="chart-tabs" id="chartTabs"></div>
      <div class="chart-box">
        <canvas id="priceChart"></canvas>
        <div class="chart-empty" id="chartEmpty">👆 点击品种查看价格走势</div>
      </div>
    </div>
  </div>

  <!-- ====== SECTION: NEWS ====== -->
  <div class="section-content" id="sectionNews">
    <div id="newsList"></div>
  </div>

  <!-- ====== SECTION: RANKING ====== -->
  <div class="section-content" id="sectionRanking">
    <div class="rank-section">
      <div class="filter-bar" id="rankFilterBar">
        <button class="filter-btn active" data-filter="all">全部</button>
      </div>
      <div style="overflow-x:auto;">
        <table class="rank-table" id="rankTable">
          <thead>
            <tr><th>#</th><th>品种</th><th>分类</th><th style="text-align:right">最新价</th><th style="text-align:right">周涨</th><th style="text-align:right">月涨</th><th style="text-align:right">季涨</th><th style="text-align:right">年涨</th><th>数据</th></tr>
          </thead>
          <tbody id="rankBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="footer">
    <p>自动: 上期所·大商所·郑商所·广期所·能源中心 ｜ 手动: 百川盈孚·隆众资讯·生意社</p>
    <p style="margin-top:4px;">⚠️ 数据仅供参考 · 期货数据为前一交易日收盘价 · 不构成投资建议</p>
  </div>
</div>

<script>
let data = null;
let chart = null;
let selectedForChart = null;

function fmt(v) {
  if (v === null || v === undefined) return '—';
  if (typeof v === 'string') return v;
  if (v >= 100000) return v.toLocaleString('zh-CN', {maximumFractionDigits:0});
  if (v >= 1000) return v.toLocaleString('zh-CN', {maximumFractionDigits:1});
  if (v >= 100) return v.toLocaleString('zh-CN', {maximumFractionDigits:1});
  return v.toLocaleString('zh-CN', {maximumFractionDigits:2});
}

function pct(n) {
  if (n === null || n === undefined || !isFinite(n)) return '—';
  return (n >= 0 ? '+' : '') + n.toFixed(1) + '%';
}

function calcPct(now, prev) {
  if (!prev || prev === 0) return null;
  return (now - prev) / prev * 100;
}

function badge(chg) {
  if (chg === null) return '<span class="change-badge flat">—</span>';
  if (chg > 0) return `<span class="change-badge up">+${chg.toFixed(1)}%</span>`;
  if (chg < 0) return `<span class="change-badge down">${chg.toFixed(1)}%</span>`;
  return '<span class="change-badge flat">+0.0%</span>';
}

function arrow(chg) {
  if (chg === null) return '';
  if (chg > 30) return '🔴↑↑↑';
  if (chg > 10) return '🔴↑↑';
  if (chg > 3) return '🔴↑';
  if (chg < -30) return '🟢↓↓↓';
  if (chg < -10) return '🟢↓↓';
  if (chg < -3) return '🟢↓';
  return '➖';
}

function isAuto(p) {
  const src = p.source || '';
  return src.includes('自动') || src.includes('·自动');
}

function categories(products) {
  const cats = new Set();
  products.forEach(p => cats.add(p.category));
  return ['全部', ...Array.from(cats).sort()];
}

// ======== RENDER ========
function render() {
  if (!data) return;
  const prods = data.products;
  document.getElementById('updateTime').textContent = `更新: ${data.update_time || '—'}`;
  renderFilter();
  renderStats();
  renderCards();
  renderChartTabs();
  renderNews();
  renderRank();
}

function renderFilter() {
  const bar = document.getElementById('filterBar');
  const rbar = document.getElementById('rankFilterBar');
  const cats = categories(data.products);
  const html = cats.map(c => `<button class="filter-btn ${c === '全部' ? 'active' : ''}" data-filter="${c}">${c}</button>`).join('');
  bar.innerHTML = html;
  rbar.innerHTML = html;
  document.querySelectorAll('#filterBar .filter-btn, #rankFilterBar .filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const parent = btn.closest('.filter-bar');
      parent.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (parent.id === 'filterBar') { renderCards(); renderStats(); }
      else { renderRank(); }
    });
  });
}

function renderStats() {
  const act = document.querySelector('#filterBar .filter-btn.active')?.dataset?.filter || 'all';
  const f = act === 'all' ? data.products : data.products.filter(p => p.category === act);
  const up = f.filter(p => (calcPct(p.price, p.month_ago)||0) > 0).length;
  const down = f.filter(p => (calcPct(p.price, p.month_ago)||0) < 0).length;
  const hot = f.filter(p => (calcPct(p.price, p.month_ago)||0) > 20).length;
  const auto = f.filter(p => isAuto(p)).length;
  const manual = f.filter(p => !isAuto(p)).length;
  document.getElementById('upCount').textContent = up;
  document.getElementById('downCount').textContent = down;
  document.getElementById('hotCount').textContent = hot;
  document.getElementById('autoCount').textContent = auto;
  document.getElementById('manualCount').textContent = manual;
  document.getElementById('totalCount').textContent = f.length;
}

function renderCards() {
  const grid = document.getElementById('cardGrid');
  const act = document.querySelector('#filterBar .filter-btn.active')?.dataset?.filter || 'all';
  const prods = act === 'all' ? data.products : data.products.filter(p => p.category === act);
  grid.innerHTML = prods.map(p => {
    const cd = calcPct(p.price, p.prev_close);
    const cw = calcPct(p.price, p.week_ago);
    const cm = calcPct(p.price, p.month_ago);
    const cq = calcPct(p.price, p.quarter_ago);
    const cy = calcPct(p.price, p.year_ago);
    const srcClass = isAuto(p) ? 'badge-auto' : 'badge-manual';
    return `<div class="card" data-id="${p.id}">
      <div class="card-top">
        <span class="card-cat">${p.category}</span>
        <span class="${srcClass}" style="padding:1px 7px;border-radius:6px;font-size:0.65em;">${p.source||'手动'}</span>
      </div>
      <div class="card-name">${p.name}</div>
      <div class="card-price-row">
        <span class="card-price">${fmt(p.price)}</span>
        <span class="card-unit">${p.unit}</span>
        <span class="card-arrow">${arrow(cm)}</span>
      </div>
      <div class="card-changes">
        ${badge(cd)} <span style="font-size:0.62em;color:var(--text-dim);">日</span>
        ${badge(cw)} <span style="font-size:0.62em;color:var(--text-dim);">周</span>
        ${badge(cm)} <span style="font-size:0.62em;color:var(--text-dim);">月</span>
        ${badge(cq)} <span style="font-size:0.62em;color:var(--text-dim);">季</span>
        ${badge(cy)} <span style="font-size:0.62em;color:var(--text-dim);">年</span>
      </div>
      ${p.pe_stock ? `<div class="card-stock">📌 ${p.pe_stock}</div>` : ''}
    </div>`;
  }).join('');
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.id;
      selectProduct(id);
      document.querySelectorAll('.card').forEach(c => c.style.borderColor = '');
      card.style.borderColor = 'var(--accent)';
    });
  });
}

function selectProduct(id) {
  selectedForChart = id;
  const p = data.products.find(pr => pr.id === id);
  if (!p) return;
  document.getElementById('chartEmpty').style.display = 'none';
  updateChart(p);
  document.querySelectorAll('.card').forEach(c => c.style.borderColor = '');
  const el = document.querySelector(`.card[data-id="${id}"]`);
  if (el) el.style.borderColor = 'var(--accent)';
  document.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
  const tab = document.querySelector(`.chart-tab[data-id="${id}"]`);
  if (tab) tab.classList.add('active');
  else { renderChartTabs(); document.querySelector(`.chart-tab[data-id="${id}"]`)?.classList.add('active'); }
}

function renderChartTabs() {
  const container = document.getElementById('chartTabs');
  if (!container) return;
  const act = document.querySelector('#filterBar .filter-btn.active')?.dataset?.filter || 'all';
  const prods = act === 'all' ? data.products : data.products.filter(p => p.category === act);
  container.innerHTML = prods.map(p =>
    `<button class="chart-tab ${p.id === selectedForChart ? 'active' : ''}" data-id="${p.id}">${p.name}</button>`
  ).join('');
  document.querySelectorAll('.chart-tab').forEach(btn => {
    btn.addEventListener('click', () => selectProduct(btn.dataset.id));
  });
}

function updateChart(p) {
  const ctx = document.getElementById('priceChart').getContext('2d');
  if (chart) chart.destroy();
  if (!p.prices || p.prices.length < 2) {
    document.getElementById('chartEmpty').style.display = 'flex';
    document.getElementById('chartEmpty').textContent = '⚠️ 历史数据不足';
    return;
  }
  const vals = p.prices.map(v => v.price);
  const labels = p.prices.map(v => v.date);
  const isUp = vals[vals.length-1] >= vals[0];
  const lineColor = isUp ? '#ef4444' : '#22c55e';
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: `${p.name} (${p.unit})`,
        data: vals,
        borderColor: lineColor,
        backgroundColor: isUp ? 'rgba(239,68,68,0.06)' : 'rgba(34,197,94,0.06)',
        fill: true,
        tension: 0.3,
        pointRadius: 2,
        pointBackgroundColor: lineColor,
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `${fmt(ctx.parsed.y)} ${p.unit}` } }
      },
      scales: {
        x: { ticks: { color: '#94a3b8', maxTicksLimit: 8, font: {size:9} }, grid: { color: 'rgba(148,163,184,0.08)' } },
        y: { ticks: { color: '#94a3b8', font: {size:9} }, grid: { color: 'rgba(148,163,184,0.08)' } }
      }
    }
  });
}

// ======== NEWS ========
function renderNews() {
  const container = document.getElementById('newsList');
  if (!data.news || data.news.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:40px 0;">暂无资讯数据</div>';
    return;
  }
  const items = data.news.sort((a,b) => b.date.localeCompare(a.date));
  const html = items.map((n, idx) => {
    const tags = (n.tags || []).map(t => `<span class="news-tag">${t}</span>`).join('');
    // 有 url 直接打开原文，没有 url 则搜索标题
    const clickUrl = n.url ? n.url : 'https://www.baidu.com/s?wd=' + encodeURIComponent(n.title);
    const openIn = n.url ? '' : '';  // all open in new tab
    return `<div class="news-item" style="display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;cursor:pointer;" onclick="window.open('${clickUrl.replace(/'/g, "\\'")}', '_blank')">
      <span class="news-date">${n.date}</span>
      <span class="news-source">[${n.source}]</span>
      <span class="news-title">${n.title} ${n.url ? '' : '🔍'}</span>
      <span class="news-tags">${tags}</span>
    </div>`;
  }).join('');
  container.innerHTML = `<div class="card" style="padding:0;"><div class="news-list">${html}</div></div>`;
}

// ======== RANKING ========
function renderRank() {
  const body = document.getElementById('rankBody');
  const act = document.querySelector('#rankFilterBar .filter-btn.active')?.dataset?.filter || 'all';
  const prods = act === 'all' ? data.products : data.products.filter(p => p.category === act);
  const ranked = prods.map(p => ({
    ...p,
    chgW: calcPct(p.price, p.week_ago),
    chgM: calcPct(p.price, p.month_ago),
    chgQ: calcPct(p.price, p.quarter_ago),
    chgY: calcPct(p.price, p.year_ago),
  })).sort((a,b) => (b.chgM||-9999) - (a.chgM||-9999));
  body.innerHTML = ranked.map((p,i) => {
    const src = isAuto(p) ? '🟢自动' : '🔵手动';
    return `<tr>
      <td><span class="rank-num">${i+1}</span></td>
      <td style="font-weight:600;">${p.name}</td>
      <td style="color:var(--text-dim);font-size:0.85em;">${p.category}</td>
      <td style="text-align:right">${fmt(p.price)}</td>
      <td class="${(p.chgW||0)>=0?'up':'down'}" style="text-align:right">${pct(p.chgW)}</td>
      <td class="${(p.chgM||0)>=0?'up':'down'}" style="text-align:right">${pct(p.chgM)}</td>
      <td class="${(p.chgQ||0)>=0?'up':'down'}" style="text-align:right">${pct(p.chgQ)}</td>
      <td class="${(p.chgY||0)>=0?'up':'down'}" style="text-align:right">${pct(p.chgY)}</td>
      <td style="font-size:0.75em;">${src}</td>
    </tr>`;
  }).join('');
}

// ======== SECTION SWITCHING ========
function switchSection(name) {
  document.querySelectorAll('.section-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.section-tab[data-section="${name}"]`)?.classList.add('active');
  document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
  document.getElementById(`section${name.charAt(0).toUpperCase()+name.slice(1)}`)?.classList.add('active');
}

document.querySelectorAll('.section-tab').forEach(tab => {
  tab.addEventListener('click', () => switchSection(tab.dataset.section));
});

// ======== LOAD ========
function loadData() {
  fetch('data.json?_=' + Date.now())
    .then(r => r.json())
    .then(d => {
      data = d;
      render();
    })
    .catch(() => {
      document.getElementById('cardGrid').innerHTML =
        '<div style="text-align:center;color:var(--text-dim);padding:60px 0;">⚠️ 数据加载失败</div>';
    });
}

document.getElementById('refreshBtn').addEventListener('click', () => {
  document.getElementById('refreshBtn').textContent = '⟳ 更新中...';
  loadData();
  setTimeout(() => { document.getElementById('refreshBtn').textContent = '⟳ 刷新'; }, 1500);
});

loadData();
</script>
</body>
</html>
